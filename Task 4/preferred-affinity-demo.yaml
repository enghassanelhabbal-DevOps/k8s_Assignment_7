apiVersion: v1
kind: Pod
metadata:
  name: preferred-affinity-demo
spec:
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: zone
                operator: In
                values:
                  - us-east
  containers:
    - name: nginx
      image: nginx